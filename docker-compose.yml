services:
  # Reverse proxy — production-like setup (FineBI is typically deployed behind Nginx)
  nginx:
    image: nginx:1.29-alpine
    container_name: finebi-nginx
    ports:
      - "37799:80"       # Main entry point: http://localhost:37799
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - finebi
    restart: unless-stopped

  # FineBI 6.1.4 application server (Tomcat)
  finebi:
    image: ddmitry80/finebi:6.1.4.01-centos
    # build: .  # Uncomment to build from Dockerfile instead of pulling from Docker Hub
    container_name: finebi
    environment:
      - TZ=Europe/Moscow
    ports:
      - "37800:37799"    # Direct Tomcat access (bypass Nginx), for debugging only
    volumes:
      - data:/usr/local/FineBI6.1/webapps/webroot
    tty: true
    restart: unless-stopped

  # External FineDB (MySQL) — FineBI metadata storage
  finedb:
    image: mysql:8.0.45-debian
    container_name: finedb
    volumes:
      - db-data:/var/lib/mysql
    command: --character-set-server=utf8 --collation-server=utf8_bin
    environment:
      TZ: Europe/Moscow
      MYSQL_ROOT_PASSWORD: finebi_root
      MYSQL_DATABASE: finedb
      MYSQL_USER: finebi
      MYSQL_PASSWORD: finebi
    ports:
      - "37798:3306"     # Direct MySQL access, for debugging only
    restart: unless-stopped

volumes:
  data:
  db-data: